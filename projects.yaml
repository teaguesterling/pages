# Portfolio Projects Configuration
# Used to generate a static portfolio site

site:
  title: "Teague Sterling's Open Source Projects"
  description: "A collection of DuckDB extensions, developer tools, and research projects"
  github_username: teaguesterling

# Badge configuration templates
badges:
  build:
    template: "https://github.com/{repo}/actions/workflows/{workflow}/badge.svg"
    link_template: "https://github.com/{repo}/actions"
    default_workflow: "MainDistributionPipeline.yml"
  docs:
    template: "https://img.shields.io/badge/docs-available-blue"
  issues:
    template: "https://img.shields.io/github/issues/{repo}"
    link_template: "https://github.com/{repo}/issues"
  license:
    template: "https://img.shields.io/github/license/{repo}"

# Project categories
categories:
  duckdb_extensions:
    title: "DuckDB Extensions"
    description: "Extensions for DuckDB, the fast in-process analytical database"
    icon: "database"

    subcategories:
      document_processing:
        title: "Document Processing"
        description: "Extensions for parsing, transforming, and analyzing documents"
        projects:
          - id: duckdb_webbed
            name: "webbed"
            repo: teaguesterling/duckdb_webbed
            description: "Comprehensive XML and HTML processing with XPath extraction, schema inference, and format conversion"
            features:
              - "XML/HTML parsing with XPath"
              - "Smart schema inference"
              - "HTML table extraction"
              - "XML to JSON conversion"
            badges: [build, docs, issues]
            docs_url: "https://duckdb-webbed.readthedocs.io"

          - id: duckdb_markdown
            name: "duckdb_markdown"
            repo: teaguesterling/duckdb_markdown
            description: "Comprehensive Markdown processing with file reading, content extraction, and block-level parsing"
            features:
              - "Read and parse Markdown files"
              - "Extract frontmatter, code blocks, links, and headings"
              - "Block-level AST access"
            badges: [build, docs, issues]
            docs_url: "https://github.com/teaguesterling/duckdb_markdown#readme"

          - id: duckdb_yaml
            name: "duckdb_yaml"
            repo: teaguesterling/duckdb_yaml
            description: "YAML file reading with native type support and multi-document handling"
            features:
              - "Read YAML files as structured data"
              - "Multi-document stream support"
              - "Type coercion and validation"
            badges: [build, issues]

          - id: duckdb_duck_block_utils
            name: "duck_block_utils"
            repo: teaguesterling/duckdb_duck_block_utils
            description: "Format-agnostic document block utilities with unified duck_block type and Pandoc AST conversion"
            features:
              - "Unified block representation"
              - "Block builders and transformers"
              - "Pandoc AST interoperability"
            badges: [build, issues]

          - id: duckdb_read_lines
            name: "duckdb_read_lines"
            repo: teaguesterling/duckdb_read_lines
            description: "Simple parsers for fast extraction from line-based files"
            features:
              - "Line-based file parsing"
              - "Fast extraction patterns"
            badges: [build, issues]

      code_analysis:
        title: "Code & Development"
        description: "Extensions for analyzing code, parsing queries, and developer workflows"
        projects:
          - id: sitting_duck
            name: "sitting_duck"
            repo: teaguesterling/sitting_duck
            description: "AST analysis using Tree-sitter for 27 programming languages with semantic type extraction"
            features:
              - "Parse source code to AST"
              - "27 language support"
              - "Pattern matching and queries"
              - "Semantic type extraction"
            badges: [build, issues]

          - id: duck_hunt
            name: "duck_hunt"
            repo: teaguesterling/duck_hunt
            description: "Log parsing extension for 90+ development tools and CI/CD systems"
            features:
              - "Parse logs from 90+ tools"
              - "Format auto-detection"
              - "CI/CD workflow parsing"
              - "Context extraction"
            badges: [build, issues]

          - id: duck_tails
            name: "duck_tails"
            repo: teaguesterling/duck_tails
            description: "Git-aware data analysis with version control integration and repository queries"
            features:
              - "git:// protocol support"
              - "Git LFS integration"
              - "Diff analysis"
              - "Repository metadata queries"
            badges: [build, issues]

      data_formats:
        title: "Data & Formats"
        description: "Extensions for specialized data formats and protocols"
        projects:
          - id: duckdb_urlpattern
            name: "duckdb_urlpattern"
            repo: teaguesterling/duckdb_urlpattern
            description: "WHATWG URLPattern API implementation for URL matching and component extraction"
            features:
              - "URLPattern matching"
              - "URL component extraction"
              - "WHATWG standard compliant"
            badges: [build, issues]

          - id: duckdb_scalarfs
            name: "duckdb_scalarfs"
            repo: teaguesterling/duckdb_scalarfs
            description: "Scalar filesystem for in-memory content including variables, inline literals, and data URIs"
            features:
              - "In-memory file content"
              - "Data URI support"
              - "Variable storage"
            badges: [build, issues]

          - id: duckdb_zim
            name: "duckdb_zim"
            repo: teaguesterling/duckdb_zim
            description: "DuckDB extension for reading ZIM files — the offline web-archive format used by Kiwix/Wikipedia"
            features:
              - "Read ZIM archive files"
              - "Query offline web content as tables"
            badges: [build, issues]

      ai_integration:
        title: "AI & Integration"
        description: "Extensions for AI agent integration and dynamic function handling"
        projects:
          - id: duckdb_mcp
            name: "duckdb_mcp"
            repo: teaguesterling/duckdb_mcp
            description: "Model Context Protocol server/client integration for AI agent connectivity"
            features:
              - "MCP server implementation"
              - "HTTP transport"
              - "Custom tool definitions"
              - "Multiple output formats"
            badges: [build, issues]

          - id: duckdb_func_apply
            name: "duckdb_func_apply"
            repo: teaguesterling/duckdb_func_apply
            description: "Dynamic function application allowing runtime invocation of functions by name"
            features:
              - "Runtime function dispatch"
              - "Dynamic invocation"
              - "Metaprogramming support"
            badges: [build, issues]

          - id: fledgling
            name: "fledgling"
            repo: teaguesterling/fledgling
            description: "MCP tools that help AI agents get their bearings in a codebase — unified SQL views over code, git, docs, and conversations, powered by DuckDB"
            features:
              - "Unified SQL views over code"
              - "Git history analysis"
              - "Documentation indexing"
              - "Conversation context"
            badges: [issues]

          - id: ducklog
            name: "ducklog"
            repo: teaguesterling/ducklog
            description: "Policy as a database — compiles umwelt agent-permission views into queryable DuckDB schemas"
            features:
              - "Compile umwelt policy to DuckDB"
              - "Query agent permissions with SQL"
              - "Policy-as-data introspection"
            badges: [issues]

      science:
        title: "Science & Research"
        description: "Extensions for scientific computing and research applications"
        projects:
          - id: geneducks
            name: "geneducks"
            repo: teaguesterling/geneducks
            description: "Genetic data analysis extension for bioinformatics workflows"
            features:
              - "Genetic data parsing"
              - "Sequence analysis"
            badges: [build, issues]
            status: development

          - id: plinking_duck
            name: "plinking_duck"
            repo: teaguesterling/plinking_duck
            description: "DuckDB tools for Plink2 genetic data analysis"
            features:
              - "Plink2 file format support"
              - "Genetic data analysis"
            badges: [build, issues]

          - id: duckhts
            name: "duckhts"
            repo: teaguesterling/duckhts
            description: "htslib-based DuckDB extension for high-throughput sequencing file formats (SAM/BAM/VCF, …)"
            features:
              - "Read HTS/genomics formats via htslib"
              - "Query sequencing data as tables"
            badges: [issues]

  # Extensions I've contributed to but didn't author
  duckdb_contributions:
    title: "DuckDB Contributions"
    description: "Extensions I've contributed to or maintain forks of"
    icon: "git-merge"

    projects:
      - id: duckdb_extension_parser_tools
        name: "parser_tools"
        repo: teaguesterling/duckdb_extension_parser_tools
        upstream: duckdb/duckdb_extension_parser_tools
        description: "SQL parsing extension exposing DuckDB's native parser for query analysis"
        features:
          - "Extract tables, functions, columns from SQL"
          - "Query structure analysis"
          - "DuckDB-native parsing"
        badges: [issues]
        role: contributor

      - id: duckdb_iceberg
        name: "duckdb_iceberg"
        repo: teaguesterling/duckdb_iceberg
        upstream: duckdb/duckdb_iceberg
        description: "Apache Iceberg table format support for DuckDB"
        features:
          - "Read Iceberg tables"
          - "Time travel queries"
          - "Partition pruning"
        badges: [build, issues]
        role: contributor
        note: "Originally developed by RelationalAI"

      - id: duckdb_rdkit
        name: "duckdb_rdkit"
        repo: teaguesterling/duckdb_rdkit
        upstream: bodowd/duckdb_rdkit
        description: "RDKit cheminformatics integration for molecular data analysis"
        features:
          - "Molecular structure handling"
          - "Chemical property calculations"
          - "Substructure search"
        badges: [build, issues]
        role: contributor
        note: "Original author: bodowd"

  tools:
    title: "Developer Tools"
    description: "Command-line tools and utilities"
    icon: "terminal"

    projects:
      - id: blq
        name: "blq"
        repo: teaguesterling/blq-cli
        description: "CLI tool for build log query and analysis using DuckDB with MCP server support"
        features:
          - "Query build logs with SQL"
          - "340+ unit tests"
          - "MCP server integration"
          - "Multiple output formats"
        badges: [build, issues]
        build_workflow: "ci.yml"

      - id: magic
        name: "magic"
        repo: teaguesterling/magic
        description: "Shell command history capture and intelligent querying system"
        features:
          - "Command history capture"
          - "Intelligent search"
          - "Context-aware suggestions"
        badges: [issues]

      - id: tmux_use
        name: "tmux-use"
        repo: teaguesterling/tmux-use
        description: "Smart tmux session management with automatic naming by context (git projects, directories)"
        features:
          - "Automatic session naming"
          - "Smart prompt integration"
          - "Tab completion"
          - "Pattern-based session management"
        badges: [issues]

      - id: auto_terminal_extension
        name: "auto-terminal-extension"
        repo: teaguesterling/auto-terminal-extension
        description: "VSCode extension for terminal-focused workflows with auto-creation and window management"
        features:
          - "Auto-create terminal in editor area"
          - "Auto-close window on terminal exit"
          - "Configurable behavior"
        badges: [issues]

      - id: ghud
        name: "ghud"
        repo: teaguesterling/ghud
        description: "GitHub Heads-Up Display — terminal dashboard for portfolio repos showing notifications, PRs, issues, and recent activity"
        features:
          - "Important notifications (review requests, mentions)"
          - "Open and recently merged PR tracking"
          - "Issues from others on your repos"
          - "Discover repos missing from portfolio"
        badges: [build, issues]
        build_workflow: "ci.yml"
        docs_url: "https://ghud.readthedocs.io"

      - id: jetsam
        name: "jetsam"
        repo: teaguesterling/jetsam
        description: "Git workflow accelerator for humans and agents — wraps multi-step git workflows into single, plannable commands with MCP integration"
        features:
          - "Single-command workflows (save, ship, sync, release)"
          - "Plan-then-execute safety model"
          - "MCP server for AI agent integration"
          - "Git worktree support"
        badges: [build, issues]
        build_workflow: "ci.yml"
        docs_url: "https://jetsam-mcp.readthedocs.io"

      - id: git_wt
        name: "git-wt"
        repo: teaguesterling/git-wt
        description: "Shortcuts for working with git worktrees"
        features:
          - "Git worktree management"
          - "Shell shortcuts"
        badges: [issues]

      - id: ffs
        name: "ffs"
        repo: teaguesterling/ffs
        description: "Crash recovery for Claude Code — recovers session context after crashes or reboots"
        features:
          - "Session recovery after crashes"
          - "TUI display of active sessions"
          - "Shows uncommitted changes and active plans"
          - "Git state and tmux history recovery"
        badges: [issues]

      - id: squackit
        name: "squackit"
        repo: teaguesterling/squackit
        description: "Semi-QUalified Agent Wingman Kit — stateful intelligence and MCP server layer for fledgling-equipped agents"
        features:
          - "Stateful agent intelligence"
          - "MCP server layer"
          - "Fledgling integration"
          - "Cross-session context"
        badges: [issues]

      - id: pluckit
        name: "pluckit"
        repo: teaguesterling/pluckit
        description: "jQuery for your source code — query and manipulate code using familiar selector patterns"
        features:
          - "Source code querying with selectors"
          - "Code manipulation"
          - "Multi-language support"
        badges: [issues]

      - id: sapartition
        name: "sapartition"
        repo: teaguesterling/sapartition
        description: "SQLAlchemy table partitioning and query splitting"
        features:
          - "Table partitioning for SQLAlchemy"
          - "Query splitting across partitions"
        badges: [issues]
        status: experimental

      - id: installation_utilities
        name: "installation-utilities"
        repo: teaguesterling/installation-utilities
        description: "Scripts and utilities to aid installation of various packages and programs"
        features:
          - "Install and setup helper scripts"
        badges: [issues]

  agent_suite:
    title: "Agent Infrastructure"
    description: "Tools for AI agent safety, control, sandboxing, and intelligence"
    icon: "shield"

    projects:
      - id: agent_riggs
        name: "agent-riggs"
        repo: teaguesterling/agent-riggs
        description: "Cross-session memory and analysis layer for AI agents with trust scoring and failure analysis"
        features:
          - "Trust scoring system (3-window EWMA)"
          - "Cross-session failure analysis"
          - "Ratchet candidate identification"
          - "Session briefings"
        badges: [issues]

      - id: kibitzer
        name: "kibitzer"
        repo: teaguesterling/kibitzer
        description: "Claude Code extension that watches tool usage and suggests better alternatives"
        features:
          - "Path protection per mode"
          - "Bash command interception with structured alternatives"
          - "Mode-based file access control"
          - "MCP server integration"
        badges: [issues]

      - id: umwelt
        name: "umwelt"
        repo: teaguesterling/umwelt
        description: "Define what an AI agent can see, edit, call, and trigger using CSS-like syntax"
        features:
          - "Unified policy language for agent permissions"
          - "Cascade-based conflict resolution"
          - "Enforcement compilers for multiple sandbox tools"
          - "Resource limits, file and tool control"
        badges: [issues]

      - id: nsjail_python
        name: "nsjail-python"
        repo: teaguesterling/nsjail-python
        description: "Python wrappers and workflows for nsjail sandboxing"
        features:
          - "Python bindings for nsjail"
          - "Sandbox configuration"
          - "Workflow integration"
        badges: [issues]

      - id: retritis
        name: "retritis"
        repo: teaguesterling/retritis
        description: "The suite that ties it all together — plugin marketplace, architecture docs, and clinical examples for the full agent toolchain"
        features:
          - "Plugin marketplace for Claude Code"
          - "Two shared substrates: DuckDB (facts) + SQLite (policy)"
          - "Clinical examples showing tool composition"
          - "Architecture documentation and diagrams"
        badges: [issues]

      - id: claude_plugins
        name: "claude-plugins"
        repo: teaguesterling/claude-plugins
        description: "Developer workflow plugins for Claude Code"
        features:
          - "Reusable skill definitions"
          - "Plugin discovery and installation"
        badges: [issues]

      - id: lackpy
        name: "lackpy"
        repo: teaguesterling/lackpy
        description: "Micro-inferencer translating natural language intent into sandboxed tool-composition programs"
        features:
          - "Intent-to-program translation"
          - "Local + cloud model inference via woollama"
          - "AST whitelist validation"
          - "MCP integration"
        badges: [issues]

      - id: woollama
        name: "woollama"
        repo: teaguesterling/woollama
        description: "MCP + OpenAI-compatible router between AI clients and inference/tool backends — model routing by namespace, recipe orchestration, and conversation-handle routing"
        features:
          - "OpenAI /v1 + MCP surfaces over one daemon"
          - "Routes <provider>/<model> to Ollama, Anthropic, OpenAI, …"
          - "woollama/<recipe> bound prompt + tools + agentic loop"
          - "Embeddable woollama.core library"
        badges: [issues]

  cosmic_desktop:
    title: "COSMIC Desktop"
    description: "Tools and AI integrations for the COSMIC desktop environment"
    icon: "monitor"

    projects:
      - id: cosmic_fabric
        name: "cosmic-fabric"
        repo: teaguesterling/cosmic-fabric
        description: "Run fabric AI patterns on your selection from the COSMIC desktop — launcher, panel, and workspace frontends over a single local fabric deployment"
        features:
          - "COSMIC launcher + panel + workspace surfaces"
          - "Single supervised fabric daemon"
          - "Streaming results with tool-loop support"
          - "Delegates inference to the woollama router"
        badges: [issues]

      - id: cosmic_goo
        name: "cosmic-goo"
        repo: teaguesterling/cosmic-goo
        description: "Grammar of Operations — a compositional noun→verb→object sentence layer over the COSMIC launcher (Rust engine + goo CLI)"
        features:
          - "Compositional command grammar for COSMIC"
          - "28+ plugins, ~90 verbs, subject addressing"
          - "Negotiation/coercion + polymorphic verbs"
          - "`--explain` planner debugger"
        badges: [issues]

  cockpit:
    title: "Cockpit Plugins"
    description: "Minimal Cockpit web-console panels for homelab services — read-only status, no build step"
    icon: "server"

    projects:
      - id: cockpit_ollama
        name: "cockpit-ollama"
        repo: teaguesterling/cockpit-ollama
        description: "Cockpit plugin showing Ollama service status, live-polled loaded/installed models, and recent log lines"
        features:
          - "Live service + model status"
          - "Installed vs loaded models"
          - "Recent log lines"
        badges: [issues]

      - id: cockpit_borgmatic
        name: "cockpit-borgmatic"
        repo: teaguesterling/cockpit-borgmatic
        description: "Cockpit plugin showing borgmatic backup status, schedule, repositories, archives, and recent logs (read-only)"
        features:
          - "Backup status + schedule"
          - "Repositories and archives"
          - "Recent log lines"
        badges: [issues]

      - id: cockpit_nvidia
        name: "cockpit-nvidia"
        repo: teaguesterling/cockpit-nvidia
        description: "Cockpit plugin showing Nvidia GPU status via nvidia-smi — live utilization, memory, temperature, power, and compute processes"
        features:
          - "Live-polled GPU utilization + memory"
          - "Temperature, power, fan"
          - "Compute process list"
        badges: [issues]

  experimental:
    title: "Experimental"
    description: "Work-in-progress projects"
    icon: "flask"

    projects:
      - id: git_messe_af
        name: "git-messe-af"
        repo: teaguesterling/git-messe-af
        description: "MESS Exchange - Meatspace Execution and Submission System"
        badges: [issues]
        status: experimental


  academic:
    title: "Academic & Research"
    description: "Scientific software and databases from my research career"
    icon: "microscope"

    projects:
      - id: zinc
        name: "ZINC Database"
        url: "https://zinc.docking.org"
        description: "Free database of commercially-available compounds for virtual screening, serving millions of molecules to researchers worldwide"
        features:
          - "Lead architect and developer (ZINC 15)"
          - "270+ million purchasable compounds"
          - "Substructure and similarity search"
          - "RESTful API and bulk download"
        role: lead
        institution: "UCSF"
        note: "One of the most widely used resources in computational drug discovery"

      - id: dock
        name: "UCSF DOCK"
        url: "http://dock.compbio.ucsf.edu"
        description: "Molecular docking program for structure-based drug design and virtual screening"
        features:
          - "Build system and portability"
          - "Testing infrastructure"
          - "Cross-platform compilation"
        role: contributor
        institution: "UCSF"

      - id: feature
        name: "FEATURE"
        url: "https://simtk.org/projects/feature"
        description: "System for analyzing protein structures using statistical descriptions of microenvironments around functional sites"
        features:
          - "Software engineering"
          - "3D functional site prediction"
          - "Machine learning on protein structure"
        role: contributor
        institution: "Stanford"

      - id: pocketfeaturedb
        name: "PocketFEATURE"
        repo: teaguesterling/pocketfeaturedb
        description: "Python implementation of PocketFEATURE — pyFEATURE wrappers plus pocket-comparison scripts for matching protein microenvironments"
        features:
          - "pyFEATURE: Python wrappers for FEATURE binaries"
          - "PocketFEATURE pocket-comparison scripts"
          - "Bundled background data"
        role: author
        institution: "Stanford"
        badges: [issues]

      - id: surface_sphere_map
        name: "surface-sphere-map"
        repo: teaguesterling/surface-sphere-map
        description: "Maps protein molecular-surface properties onto a sphere for structural analysis (from MSRoll surface output)"
        features:
          - "Projects PDB surfaces to a spherical map"
          - "Configurable voxel resolution"
        role: author
        badges: [issues]

      - id: rdalchemy
        name: "rdalchemy"
        repo: teaguesterling/rdalchemy
        description: "RDKit integration for SQLAlchemy — map RDKit molecule and fingerprint types to SQL columns for cheminformatics queries (built for ZINC)"
        features:
          - "Mol and Bfp SQLAlchemy column types"
          - "Tanimoto similarity thresholds in ORM queries"
          - "RDKit-Postgres cheminformatics support"
        role: author
        badges: [issues]

      - id: aggregator_advisor_example
        name: "aggregator-advisor-example"
        repo: teaguesterling/aggregator-advisor-example
        description: "Example chemical-database web app (Flask + SQLAlchemy + RDKit via rdalchemy) demonstrating functional similarity indexing"
        features:
          - "Flask + SQLAlchemy chemical database"
          - "RDKit integration through rdalchemy"
          - "Functional indexes for similarity search"
        role: author
        note: "Archived reference/example"
        badges: [issues]

# Display settings
display:
  show_status_badges: true
  show_feature_lists: true
  max_features_shown: 4
  group_by_subcategory: true

# Theme configuration
theme:
  primary_color: "#2d5a27"  # DuckDB green-ish
  accent_color: "#ffc107"
  dark_mode: true
